name: Build and Release Android App

on:
  push:
    tags:
      - 'v*'
  workflow_dispatch:
    inputs:
      tag_name:
        description: 'Tag name for the release (e.g., v1.0.0)'
        required: true
        type: string

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Go
        uses: actions/setup-go@v5
        with:
          go-version: '1.23'

      - name: Set up Java
        uses: actions/setup-java@v4
        with:
          distribution: 'temurin'
          java-version: '17'

      - name: Install gomobile
        run: |
          go install golang.org/x/mobile/cmd/gomobile@latest
          gomobile init

      - name: Build Go AAR (ARM64)
        run: |
          mkdir -p android-app/app/libs
          go mod download
          
          # Set up Android NDK toolchain for ARM64 cross-compilation
          export ANDROID_NDK_HOME=${ANDROID_NDK_HOME:-/usr/local/lib/android/sdk/ndk}
          export CC=${ANDROID_NDK_HOME}/toolchains/llvm/prebuilt/linux-x86_64/bin/aarch64-linux-android24-clang
          export CGO_ENABLED=1
          export GOARCH=arm64
          export GOOS=android
          export CGO_LDFLAGS="-Wl,-z,max-page-size=16384"
          
          # Build Go shared library with 16KB page alignment for Android 16
          gomobile bind -target=android -androidapi 23 -o android-app/app/libs/booking.aar agent/mobile
        env:
          GO111MODULE: on

      - name: Build Android APK
        run: |
          cd android-app
          ./gradlew assembleRelease

      - name: Create Release
        uses: softprops/action-gh-release@v1
        with:
          tag_name: ${{ github.event.inputs.tag_name || github.ref_name }}
          files: |
            android-app/app/build/outputs/apk/release/*.apk
            android-app/app/libs/booking.aar
          generate_release_notes: true
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
