name: Build and Release Android App

on:
  push:
    tags:
      - 'v*'
  workflow_dispatch:
    inputs:
      tag_name:
        description: 'Tag name for the release (e.g., v1.0.0)'
        required: true
        type: string

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Go
        uses: actions/setup-go@v5
        with:
          go-version: '1.25'

      - name: Set up Java
        uses: actions/setup-java@v4
        with:
          distribution: 'temurin'
          java-version: '17'

      - name: Install gomobile and gobind
        run: |
          go install golang.org/x/mobile/cmd/gomobile@latest
          go install golang.org/x/mobile/cmd/gobind@latest
          gomobile init

      - name: Prepare Go Dependencies
        run: |
          # The 'bind' package is required by the gomobile generator
          go get golang.org/x/mobile/bind
          go mod tidy
          go mod download

      - name: Build Go AAR
        run: |
          mkdir -p android-app/libs
          # Target the ./mobile package relative to root
          gomobile bind -target=android -androidapi 23 -v -o android-app/libs/booking.aar ./mobile
        env:
          GO111MODULE: on

      - name: Build Android APK
        run: |
          cd android-app
          chmod +x gradlew
          ./gradlew assembleRelease

      - name: Create Release
        uses: softprops/action-gh-release@v1
        with:
          tag_name: ${{ github.event.inputs.tag_name || github.ref_name }}
          files: |
            android-app/app/build/outputs/apk/release/*.apk
            android-app/libs/booking.aar
          generate_release_notes: true
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
