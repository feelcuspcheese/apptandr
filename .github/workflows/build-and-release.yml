name: Build Android Debug APK

on:
  push:
    branches:
      - main
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Go
        uses: actions/setup-go@v5
        with:
          go-version: '1.23'

      - name: Set up Java
        uses: actions/setup-java@v4
        with:
          distribution: 'temurin'
          java-version: '17'

      - name: Install gomobile (Go 1.23 compatible)
        run: |
          # Clone the repo and checkout a commit from late 2024 to avoid Go 1.25 requirement
          git clone https://go.googlesource.com/mobile /tmp/mobile
          cd /tmp/mobile
          git checkout $(git rev-list -n 1 --before="2024-12-01" HEAD)
          go install ./cmd/gomobile
          go install ./cmd/gobind
          export PATH=$PATH:$(go env GOPATH)/bin
          gomobile init

      - name: Build Go AAR
        run: |
          mkdir -p android-app/app/libs
          cd mobile
          
          # Force golang.org/x/sys to a version compatible with Go 1.23
          # (v0.42.0 requires Go 1.25, v0.26.0 works perfectly with Go 1.23)
          go get golang.org/x/sys@v0.26.0
          
          # Ensure we use compatible dependency versions
          go mod tidy
          go mod download
          cd ..
          
          export PATH=$PATH:$(go env GOPATH)/bin
          # Build for all supported architectures per TECHNICAL_SPEC.md section 1
          # minSdk = 23 for broad compatibility
          gomobile bind -target=android -androidapi 23 -o android-app/app/libs/booking.aar ./mobile
        env:
          GO111MODULE: on
          GOTOOLCHAIN: local # Prevents Go from automatically upgrading to Go 1.25

      - name: Verify AAR was built
        run: |
          ls -la android-app/app/libs/
          file android-app/app/libs/booking.aar || true

      - name: Build Android Debug APK
        run: |
          cd android-app
          chmod +x gradlew
          ./gradlew assembleDebug --no-daemon --stacktrace
        
      - name: Verify APK was built
        run: |
          echo "=== Checking APK output directory ==="
          ls -la android-app/app/build/outputs/apk/debug/ || true
          echo "=== Finding all APK files ==="
          find android-app/app/build/outputs -name "*.apk" -type f

      - name: Create GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: debug-${{ github.run_number }}
          name: Debug Build ${{ github.run_number }}
          body: |
            Debug APK build #${{ github.run_number }}
            
            **Build Details:**
            - Commit: ${{ github.sha }}
            - Triggered by: ${{ github.actor }}
            
            **Installation:**
            Download `app-debug.apk` and install on your Android device.
          draft: false
          prerelease: true
          files: |
            android-app/app/build/outputs/apk/debug/*.apk
            android-app/app/libs/booking.aar
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

      - name: Upload Debug APK (Artifact)
        uses: actions/upload-artifact@v4
        with:
          name: app-debug
          path: android-app/app/build/outputs/apk/debug/*.apk
          retention-days: 30

      - name: Upload AAR (Artifact)
        uses: actions/upload-artifact@v4
        with:
          name: booking-aar
          path: android-app/app/libs/booking.aar
          retention-days: 30
