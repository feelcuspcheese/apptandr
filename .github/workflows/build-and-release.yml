name: Build Android Debug APK

on:
  push:
    branches:
      - main
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Go
        uses: actions/setup-go@v5
        with:
          go-version: '1.23'

      - name: Set up Java
        uses: actions/setup-java@v4
        with:
          distribution: 'temurin'
          java-version: '17'

      - name: Install gomobile
        run: |
          go install golang.org/x/mobile/cmd/gomobile@latest
          gomobile init

      - name: Build Go AAR
        run: |
          mkdir -p android-app/libs
          go mod download
          # Build for all supported architectures per TECHNICAL_SPEC.md section 1
          # minSdk = 23 for broad compatibility
          gomobile bind -target=android -androidapi 23 -o android-app/libs/booking.aar ./mobile
        env:
          GO111MODULE: on

      - name: Build Android Debug APK
        run: |
          cd android-app
          ./gradlew assembleDebug

      - name: Create GitHub Release
        uses: softprops/action-gh-release@v1
        with:
          tag_name: debug-${{ github.run_number }}
          name: Debug Build ${{ github.run_number }}
          body: |
            Debug APK build #${{ github.run_number }}
            
            **Build Details:**
            - Commit: ${{ github.sha }}
            - Triggered by: ${{ github.actor }}
            - Built at: ${{ github.event.head_commit.timestamp }}
            
            **Installation:**
            Download `app-debug.apk` and install on your Android device.
          draft: false
          prerelease: true
          files: |
            android-app/app/build/outputs/apk/debug/app-debug.apk
            android-app/libs/booking.aar
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

      - name: Upload Debug APK (Artifact)
        uses: actions/upload-artifact@v4
        with:
          name: app-debug
          path: android-app/app/build/outputs/apk/debug/app-debug.apk
          if-no-files-found: error

      - name: Upload AAR (Artifact)
        uses: actions/upload-artifact@v4
        with:
          name: booking-aar
          path: android-app/libs/booking.aar
          if-no-files-found: error
