name: Build Android Debug APK

on:
  push:
    branches:
      - main
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Go
        uses: actions/setup-go@v5
        with:
          go-version: '1.23'

      - name: Set up Java
        uses: actions/setup-java@v4
        with:
          distribution: 'temurin'
          java-version: '17'

      - name: Install gomobile
        run: |
          go install golang.org/x/mobile/cmd/gomobile@latest
          gomobile init

      - name: Build Go AAR
        run: |
          mkdir -p android-app/libs
          go mod download
          # Build for all supported architectures per TECHNICAL_SPEC.md section 1
          # minSdk = 23 for broad compatibility
          gomobile bind -target=android -androidapi 23 -o android-app/libs/booking.aar ./mobile
        env:
          GO111MODULE: on

      - name: Build Android Debug APK
        run: |
          cd android-app
          chmod +x gradlew
          ./gradlew assembleDebug --no-daemon --stacktrace
        
      - name: Verify APK was built
        run: |
          echo "=== Checking APK output directory ==="
          ls -la android-app/app/build/outputs/apk/debug/ || true
          echo "=== Finding all APK files ==="
          find android-app/app/build/outputs -name "*.apk" -type f
          echo "=== Listing all files in outputs directory ==="
          find android-app/app/build/outputs -type f | head -20

      - name: Create GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: debug-${{ github.run_number }}
          name: Debug Build ${{ github.run_number }}
          body: |
            Debug APK build #${{ github.run_number }}
            
            **Build Details:**
            - Commit: ${{ github.sha }}
            - Triggered by: ${{ github.actor }}
            - Built at: ${{ github.event.head_commit.timestamp }}
            
            **Installation:**
            Download `app-debug.apk` and install on your Android device.
          draft: false
          prerelease: true
          files: |
            android-app/app/build/outputs/apk/debug/app-debug.apk
            android-app/libs/booking.aar
          fail_on_unmatched_files: true
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

      - name: Upload Debug APK (Artifact)
        uses: actions/upload-artifact@v4
        with:
          name: app-debug
          path: |
            android-app/app/build/outputs/apk/debug/*.apk
            android-app/app/build/outputs/apk/**/*.apk
          if-no-files-found: error
          retention-days: 30

      - name: Upload AAR (Artifact)
        uses: actions/upload-artifact@v4
        with:
          name: booking-aar
          path: android-app/libs/booking.aar
          if-no-files-found: error
