name: Build and Release Android App

on:
  push:
    tags:
      - 'v*'
  workflow_dispatch:
    inputs:
      tag_name:
        description: 'Tag name for the release (e.g., v1.0.0)'
        required: true
        type: string

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Go
        uses: actions/setup-go@v5
        with:
          go-version: '1.25'
          cache: true

      - name: Set up Java
        uses: actions/setup-java@v4
        with:
          distribution: 'temurin'
          java-version: '17'

      - name: Install gomobile and gobind
        run: |
          # Install both tools at once to ensure version parity
          go install golang.org/x/mobile/cmd/gomobile@latest
          go install golang.org/x/mobile/cmd/gobind@latest
          
          # Add GOPATH/bin to the PATH for the duration of this job
          echo "$(go env GOPATH)/bin" >> $GITHUB_PATH
          
          # Initialize gomobile (must be able to find gobind in PATH)
          $(go env GOPATH)/bin/gomobile init

      - name: Priming Go Module and Bind dependencies
        run: |
          # Critical Fix: Explicitly add the bind package to satisfying the toolchain check
          go get golang.org/x/mobile/bind
          go mod tidy
          go mod download

      - name: Build Go AAR (Section 8 Tech Spec)
        run: |
          mkdir -p android-app/libs
          
          # Use relative path ./mobile to ensure tool chain local resolution
          # Target API 23 for wide compatibility per Tech Spec
          gomobile bind \
            -target=android \
            -androidapi 23 \
            -v \
            -o android-app/libs/booking.aar \
            ./mobile
        env:
          GO111MODULE: on
          CGO_ENABLED: 1

      - name: Build Android APK
        run: |
          cd android-app
          chmod +x gradlew
          # This builds the Universal APK as configured in your build.gradle.kts
          ./gradlew assembleRelease

      - name: Create Release
        uses: softprops/action-gh-release@v1
        with:
          tag_name: ${{ github.event.inputs.tag_name || github.ref_name }}
          files: |
            android-app/app/build/outputs/apk/release/*.apk
            android-app/libs/booking.aar
          generate_release_notes: true
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
