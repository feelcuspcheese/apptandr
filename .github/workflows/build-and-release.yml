name: Build and Release Android App

on:
  push:
    tags:
      - 'v*'
  workflow_dispatch:
    inputs:
      tag_name:
        description: 'Tag name'
        required: true
        type: string

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Go
        uses: actions/setup-go@v5
        with:
          go-version: '1.25'
          cache: true

      - name: Set up Java
        uses: actions/setup-java@v4
        with:
          distribution: 'temurin'
          java-version: '17'

      - name: Install gomobile and gobind
        run: |
          go install golang.org/x/mobile/cmd/gomobile@latest
          go install golang.org/x/mobile/cmd/gobind@latest
          echo "$(go env GOPATH)/bin" >> $GITHUB_PATH
          # Ensure gobind is in path before init
          export PATH=$PATH:$(go env GOPATH)/bin
          gomobile init

      - name: Fix Go Dependencies
        run: |
          go get golang.org/x/mobile/bind
          go mod tidy
          go mod download

      - name: Build Go AAR (Adhering to Tech Spec Section 8)
        run: |
          # FIXED: Output path matches the app module's libs folder
          mkdir -p android-app/app/libs
          
          # Using module path 'agent/mobile' as go.mod is in the root
          gomobile bind \
            -target=android \
            -androidapi 23 \
            -v \
            -o android-app/app/libs/booking.aar \
            agent/mobile
        env:
          GO111MODULE: on
          CGO_ENABLED: 1

      - name: Build Android APK
        run: |
          cd android-app
          chmod +x gradlew
          # Pass flag to suppress SDK 35 warning if necessary, though path is the main fix
          ./gradlew assembleRelease -Pandroid.suppressUnsupportedCompileSdk=35

      - name: Create Release
        uses: softprops/action-gh-release@v1
        with:
          tag_name: ${{ github.event.inputs.tag_name || github.ref_name }}
          files: |
            android-app/app/build/outputs/apk/release/*.apk
            android-app/app/libs/booking.aar
          generate_release_notes: true
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
