name: Build and Release Android App

on:
  push:
    tags:
      - 'v*'
  workflow_dispatch:
    inputs:
      tag_name:
        description: 'Tag name for the release (e.g., v1.0.0)'
        required: true
        type: string

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Go
        uses: actions/setup-go@v5
        with:
          go-version: '1.25'
          cache: true

      - name: Set up Java
        uses: actions/setup-java@v4
        with:
          distribution: 'temurin'
          java-version: '17'

      - name: Install gomobile and gobind
        run: |
          go install golang.org/x/mobile/cmd/gomobile@latest
          go install golang.org/x/mobile/cmd/gobind@latest
          # Add the go bin to path so gomobile init can find gobind
          echo "$(go env GOPATH)/bin" >> $GITHUB_PATH
          # Wait for path update then init
          $(go env GOPATH)/bin/gomobile init

      - name: Build Go AAR
        run: |
          # 1. Sync dependencies
          go mod tidy
          go mod download
          # 2. Get the bind package explicitly to satisfy the build tool
          go get golang.org/x/mobile/bind
          
          mkdir -p android-app/libs
          
          # 3. Bind the package using the module-aware path
          # We use agent/mobile because go.mod defines 'module agent'
          gomobile bind -target=android -androidapi 23 -v -o android-app/libs/booking.aar agent/mobile
        env:
          GO111MODULE: on

      - name: Build Android APK
        run: |
          cd android-app
          chmod +x gradlew
          ./gradlew assembleRelease

      - name: Create Release
        uses: softprops/action-gh-release@v1
        with:
          tag_name: ${{ github.event.inputs.tag_name || github.ref_name }}
          files: |
            android-app/app/build/outputs/apk/release/*.apk
            android-app/libs/booking.aar
          generate_release_notes: true
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
