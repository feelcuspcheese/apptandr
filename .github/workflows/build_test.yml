name: Build ELF Aligned

on:
  push:
    tags:
      - 'v*'
  workflow_dispatch:
    inputs:
      tag_name:
        description: 'Tag name'
        required: true
        type: string

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Go
        uses: actions/setup-go@v5
        with:
          go-version: '1.25'
          cache: true

      - name: Set up Java
        uses: actions/setup-java@v4
        with:
          distribution: 'temurin'
          java-version: '17'

      - name: Set up Android SDK and NDK
        uses: android-actions/setup-android@v2
        with:
          ndk-version: '25.2.9519653'
          api-level: 33
          build-tools: '33.0.2'

      - name: Install gomobile and gobind
        run: |
          go install golang.org/x/mobile/cmd/gomobile@latest
          go install golang.org/x/mobile/cmd/gobind@latest
          echo "$(go env GOPATH)/bin" >> $GITHUB_PATH
          export PATH=$PATH:$(go env GOPATH)/bin
          gomobile init

      - name: Fix Go Dependencies
        run: |
          go get golang.org/x/mobile/bind
          go mod tidy
          go mod download

      - name: Build Go AAR (16KB page attempt)
        run: |
          mkdir -p android-app/app/libs

          export CGO_ENABLED=1
          export GOOS=android
          export GOARCH=arm64
          export CGO_LDFLAGS="-Wl,-z,max-page-size=16384"

          gomobile bind \
            -target=android \
            -androidapi 23 \
            -v \
            -ldflags='-linkmode=external' \
            -o android-app/app/libs/booking.aar \
            agent/mobile

      - name: Verify 16KB alignment in AAR
        run: |
          unzip -o android-app/app/libs/booking.aar -d aar_extract
          find aar_extract -name "*.so" -exec readelf -l {} \; | grep Align

      - name: Build Android APK (Debuggable)
        run: |
          cd android-app
          chmod +x gradlew
          ./gradlew assembleDebug -Pandroid.suppressUnsupportedCompileSdk=35

      - name: Create Release
        uses: softprops/action-gh-release@v1
        with:
          tag_name: ${{ github.event.inputs.tag_name || github.ref_name }}
          files: |
            android-app/app/build/outputs/apk/debug/*.apk
            android-app/app/libs/booking.aar
          generate_release_notes: true
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
